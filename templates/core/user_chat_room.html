{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 position-relative">

    <div class="position-absolute" style="top: -20px; left: 15px;">
        <a href="{% url 'tools_home' %}" class="btn btn-outline-secondary px-3 py-2 rounded-pill fw-bold btn-sm shadow-sm">
            <i class="fa-solid fa-arrow-left me-1"></i> Panelga qaytish
        </a>
    </div>

    <div class="row justify-content-center mt-4">
        <div class="col-md-10">
            <div class="card shadow border-0" style="background-color: #121824; border-radius: 20px; height: 75vh; overflow: hidden; border: 1px solid rgba(0, 242, 254, 0.15);">

                <div class="card-header d-flex align-items-center justify-content-between px-4 py-3" style="background-color: #1a2234; border-bottom: 1px solid rgba(255,255,255,0.05);">
                    <div class="d-flex align-items-center">
                        <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3 shadow" style="width: 45px; height: 45px;">
                            <i class="fa-solid fa-paper-plane fs-5"></i>
                        </div>
                        <div>
                            <h5 id="active-chat-title" class="text-white fw-bold m-0">Umumiy Chat</h5>
                            <small class="text-success" id="chat-status-sub">Hamma shu yerda yozishadi</small>
                        </div>
                    </div>
                </div>

                <div class="row g-0 h-100" style="margin-top: -1px;">

                    <div class="col-md-4 border-end" style="border-color: rgba(255,255,255,0.05) !important; background-color: #161f30; max-height: calc(75vh - 70px); overflow-y: auto;">
                        <div class="list-group list-group-flush" id="users-list-group">
                            <button onclick="switchChat('general', null, 'Umumiy Chat')" class="list-group-item list-group-item-action border-0 px-4 py-3 text-white active-chat-item" style="background-color: rgba(0, 242, 254, 0.1); border-left: 4px solid #00f2fe;">
                                <div class="d-flex align-items-center">
                                    <div class="bg-secondary rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px;">
                                        <i class="fa-solid fa-users"></i>
                                    </div>
                                    <div>
                                        <div class="fw-bold">Umumiy Chat</div>
                                        <small class="text-muted">Hamma ko'ra oladi</small>
                                    </div>
                                </div>
                            </button>
                            </div>
                    </div>

                    # O'ng panel: Xabarlar maydoni
                    <div class="col-md-8 d-flex flex-column justify-content-between" style="background-color: #121824; max-height: calc(75vh - 70px);">

                        <div id="chat-messages-box" class="p-4 flex-grow-1" style="overflow-y: auto; display: flex; flex-direction: column; gap: 15px;">
                            <div class="text-center text-muted my-auto">Yuklanmoqda...</div>
                        </div>

                        <div class="p-3" style="background-color: #161f30; border-top: 1px solid rgba(255,255,255,0.05);">
                            <form id="chat-message-form" onsubmit="sendMessage(event)" class="d-flex gap-2">
                                <input type="text" id="chat-input-field" class="form-control border-0 text-white px-4 py-3" placeholder="Xabar yozing..." style="background-color: #1e293b; border-radius: 30px;" autocomplete="off">
                                <button type="submit" class="btn btn-primary d-flex align-items-center justify-content-center shadow" style="border-radius: 50%; width: 50px; height: 50px;">
                                    <i class="fa-solid fa-paper-plane"></i>
                                </button>
                            </form>
                        </div>

                    </div>

                </div>

            </div>
        </div>
    </div>
</div>

<script>
    let currentChatType = 'general';
    let currentActiveUserId = null;
    const currentUsername = "{{ request.user.username }}";

    // Sahifa yuklanganda ishga tushadigan qism
    document.addEventListener("DOMContentLoaded", () => {
        loadUsers();
        loadMessages();
        // Har 3 soniyada yangi xabarlarni avtomatik tekshirib turish (Polling)
        setInterval(loadMessages, 3000);
    });

    // Foydalanuvchilar ro'yxatini yuklash
    function loadUsers() {
        fetch("{% url 'get_chat_users' %}")
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('users-list-group');
                data.users.forEach(user => {
                    const btn = document.createElement('button');
                    btn.className = "list-group-item list-group-item-action border-0 px-4 py-3 text-white-50 bg-transparent user-chat-btn-item";
                    btn.style.transition = "all 0.2s ease";
                    btn.onclick = () => switchChat('private', user.id, `@${user.username}`);
                    btn.innerHTML = `
                        <div class="d-flex align-items-center">
                            <div class="bg-dark border border-secondary rounded-circle d-flex align-items-center justify-content-center text-info fw-bold me-3" style="width: 40px; height: 40px;">
                                ${user.username.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <div class="fw-bold text-white">${user.username}</div>
                                <small class="text-muted">Shaxsiy xabar</small>
                            </div>
                        </div>
                    `;
                    container.appendChild(btn);
                });
            });
    }

    // Xabarlarni serverdan tortib kelish
    function loadMessages() {
        let url = `{% url 'get_messages' %}?type=${currentChatType}`;
        if (currentChatType === 'private') {
            url += `&user_id=${currentActiveUserId}`;
        }

        fetch(url)
            .then(res => res.json())
            .then(data => {
                const box = document.getElementById('chat-messages-box');
                const wasAtBottom = box.scrollHeight - box.clientHeight <= box.scrollTop + 50;

                if(data.messages.length === 0) {
                    box.innerHTML = `<div class="text-center text-muted my-auto">Bu yerda hozircha xabarlar yo'q. Birinchi bo'lib yozing!</div>`;
                    return;
                }

                box.innerHTML = data.messages.map(msg => {
                    const isMe = msg.sender === currentUsername;
                    return `
                        <div class="d-flex flex-column ${isMe ? 'align-items-end' : 'align-items-start'}">
                            <div class="small text-muted mb-1 px-2">${isMe ? 'Siz' : '@' + msg.sender}</div>
                            <div class="p-3 rounded-3 shadow-sm text-white" style="max-width: 75%; word-break: break-word;
                                 background-color: ${isMe ? '#0d6efd' : '#212e46'};
                                 border-radius: ${isMe ? '15px 15px 0px 15px' : '15px 15px 15px 0px'} !important;">
                                ${msg.text}
                                <div class="text-end text-white-50 ms-3 d-inline-block" style="font-size: 10px; float: right; margin-top: 5px;">${msg.time}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                if (wasAtBottom) {
                    box.scrollTop = box.scrollHeight;
                }
            });
    }

    // Chatlar orasida almashish (Umumiy <-> Shaxsiy)
    function switchChat(type, userId, title) {
        currentChatType = type;
        currentActiveUserId = userId;

        document.getElementById('active-chat-title').innerText = title;
        document.getElementById('chat-status-sub').innerText = type === 'general' ? 'Hamma shu yerda yozishadi' : 'Xavfsiz shaxsiy yozishmalar';

        // Aktivlik vizual borderini to'g'rilash
        document.querySelectorAll('.list-group-item').forEach(el => {
            el.style.backgroundColor = 'transparent';
            el.style.borderLeft = 'none';
        });

        const activeBtn = event.currentTarget;
        activeBtn.style.backgroundColor = 'rgba(0, 242, 254, 0.1)';
        activeBtn.style.borderLeft = '4px solid #00f2fe';

        document.getElementById('chat-messages-box').innerHTML = `<div class="text-center text-muted my-auto">Yuklanmoqda...</div>`;
        loadMessages();
    }

    // Xabar yuborish
    function sendMessage(e) {
        e.preventDefault();
        const input = document.getElementById('chat-input-field');
        const text = input.value.trim();
        if (!text) return;

        const bodyData = { type: currentChatType, text: text };
        if (currentChatType === 'private') {
            bodyData.user_id = currentActiveUserId;
        }

        fetch("{% url 'send_message' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify(bodyData)
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                input.value = '';
                loadMessages();
                setTimeout(() => {
                    const box = document.getElementById('chat-messages-box');
                    box.scrollTop = box.scrollHeight;
                }, 100);
            }
        });
    }
</script>

<style>
    #chat-messages-box::-webkit-scrollbar, .col-md-4::-webkit-scrollbar {
        width: 6px;
    }
    #chat-messages-box::-webkit-scrollbar-thumb, .col-md-4::-webkit-scrollbar-thumb {
        background-color: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
    }
    .user-chat-btn-item:hover {
        background-color: rgba(255,255,255,0.02) !important;
    }
</style>
{% endblock %}
