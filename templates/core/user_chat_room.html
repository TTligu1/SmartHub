<script>
    let currentChatType = 'general';
    let currentActiveUserId = null;
    const currentUsername = "{{ request.user.username }}";

    document.addEventListener("DOMContentLoaded", () => {
        loadUsers();
        loadMessages();
        // Har 3 soniyada xabarlarni avtomatik yangilash
        setInterval(loadMessages, 3000);
    });

    // Foydalanuvchilar ro'yxatini yuklash (Mutloq statik yo'nalish bilan)
    function loadUsers() {
        fetch("/chat/api/users/")
            .then(res => {
                if (!res.ok) throw new Error("Tarmoq xatosi");
                return res.json();
            })
            .then(data => {
                const container = document.getElementById('users-list-group');
                // Takrorlanishning oldini olish uchun tozalaymiz
                container.innerHTML = `
                    <button onclick="switchChat('general', null, 'Umumiy Chat')" class="list-group-item list-group-item-action border-0 px-4 py-3 text-white active-chat-item" style="background-color: rgba(0, 242, 254, 0.1); border-left: 4px solid #00f2fe;">
                        <div class="d-flex align-items-center">
                            <div class="bg-secondary rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px;">
                                <i class="fa-solid fa-users"></i>
                            </div>
                            <div>
                                <div class="fw-bold">Umumiy Chat</div>
                                <small class="text-muted">Hamma ko'ra oladi</small>
                            </div>
                        </div>
                    </button>
                `;

                data.users.forEach(user => {
                    const btn = document.createElement('button');
                    btn.className = "list-group-item list-group-item-action border-0 px-4 py-3 text-white-50 bg-transparent user-chat-btn-item";
                    btn.style.transition = "all 0.2s ease";
                    btn.onclick = (e) => switchChat('private', user.id, `@${user.username}`, e);
                    btn.innerHTML = `
                        <div class="d-flex align-items-center">
                            <div class="bg-dark border border-secondary rounded-circle d-flex align-items-center justify-content-center text-info fw-bold me-3" style="width: 40px; height: 40px;">
                                ${user.username.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <div class="fw-bold text-white">${user.username}</div>
                                <small class="text-muted">Shaxsiy xabar</small>
                            </div>
                        </div>
                    `;
                    container.appendChild(btn);
                });
            })
            .catch(err => console.error("Foydalanuvchilarni yuklashda xatolik:", err));
    }

    // Xabarlarni yuklash (Mutloq statik yo'nalish bilan)
    function loadMessages() {
        let url = `/chat/api/messages/?type=${currentChatType}`;
        if (currentChatType === 'private') {
            url += `&user_id=${currentActiveUserId}`;
        }

        fetch(url)
            .then(res => res.json())
            .then(data => {
                const box = document.getElementById('chat-messages-box');
                const wasAtBottom = box.scrollHeight - box.clientHeight <= box.scrollTop + 50;

                if(!data.messages || data.messages.length === 0) {
                    box.innerHTML = `<div class="text-center text-muted my-auto">Bu yerda hozircha xabarlar yo'q. Birinchi bo'lib yozing!</div>`;
                    return;
                }

                box.innerHTML = data.messages.map(msg => {
                    const isMe = msg.sender === currentUsername;
                    return `
                        <div class="d-flex flex-column ${isMe ? 'align-items-end' : 'align-items-start'}">
                            <div class="small text-muted mb-1 px-2">${isMe ? 'Siz' : '@' + msg.sender}</div>
                            <div class="p-3 rounded-3 shadow-sm text-white" style="max-width: 75%; word-break: break-word;
                                 background-color: ${isMe ? '#0d6efd' : '#212e46'};
                                 border-radius: ${isMe ? '15px 15px 0px 15px' : '15px 15px 15px 0px'} !important;">
                                ${msg.text}
                                <div class="text-end text-white-50 ms-3 d-inline-block" style="font-size: 10px; float: right; margin-top: 5px;">${msg.time}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                if (wasAtBottom) {
                    box.scrollTop = box.scrollHeight;
                }
            })
            .catch(err => console.error("Xabarlarni yuklashda xatolik:", err));
    }

    // Chatni almashtirish
    function switchChat(type, userId, title, event) {
        currentChatType = type;
        currentActiveUserId = userId;

        document.getElementById('active-chat-title').innerText = title;
        document.getElementById('chat-status-sub').innerText = type === 'general' ? 'Hamma shu yerda yozishadi' : 'Xavfsiz shaxsiy yozishmalar';

        document.querySelectorAll('.list-group-item').forEach(el => {
            el.style.backgroundColor = 'transparent';
            el.style.borderLeft = 'none';
        });

        const activeBtn = event ? event.currentTarget : document.querySelector('.list-group-item');
        if (activeBtn) {
            activeBtn.style.backgroundColor = 'rgba(0, 242, 254, 0.1)';
            activeBtn.style.borderLeft = '4px solid #00f2fe';
        }

        document.getElementById('chat-messages-box').innerHTML = `<div class="text-center text-muted my-auto">Yuklanmoqda...</div>`;
        loadMessages();
    }

    // Xabar yuborish (Mutloq statik yo'nalish bilan)
    function sendMessage(e) {
        e.preventDefault();
        const input = document.getElementById('chat-input-field');
        const text = input.value.trim();
        if (!text) return;

        const bodyData = { type: currentChatType, text: text };
        if (currentChatType === 'private') {
            bodyData.user_id = currentActiveUserId;
        }

        fetch("/chat/api/send/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify(bodyData)
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                input.value = '';
                loadMessages();
                setTimeout(() => {
                    const box = document.getElementById('chat-messages-box');
                    box.scrollTop = box.scrollHeight;
                }, 100);
            }
        })
        .catch(err => console.error("Xabar yuborishda xatolik:", err));
    }
</script>
