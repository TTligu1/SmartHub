{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">

            <h3 class="mb-4 fw-bold text-white"><i class="fa-solid fa-keyboard text-warning me-2"></i> Tez yozish poygasi</h3>

            <div class="card p-4 mb-4" style="background-color: #121824; border: 1px solid rgba(0, 242, 254, 0.15); border-radius: 15px;">
                <p id="text-to-type" class="fs-4 text-secondary tracking-wide select-none m-0" style="line-height: 1.6;">{{ text_to_type }}</p>

            </div>

            <div class="mb-4">
                <input type="text" id="input-field" class="form-control form-control-lg text-white bg-dark border-secondary text-center py-3 fs-5" placeholder="Yozishni boshlang..." autocomplete="off" autofocus style="border-radius: 12px;">
            </div>

            <div class="row g-3 justify-content-center text-center mb-4">
                <div class="col-3">
                    <div class="small text-secondary">Tezlik</div>
                    <div class="fs-3 fw-bold text-success"><span id="wpm-val">0</span> <span class="fs-6 text-muted">WPM</span></div>
                </div>
                <div class="col-3">
                    <div class="small text-secondary">Anriqlik</div>
                    <div class="fs-3 fw-bold text-warning"><span id="accuracy-val">100</span> <span class="fs-6 text-muted">%</span></div>
                </div>
                <div class="col-3">
                    <div class="small text-secondary">Vaqt</div>
                    <div class="fs-3 fw-bold text-info"><span id="time-val">0</span> <span class="fs-6 text-muted">s</span></div>
                </div>
            </div>

            <div id="result-container" class="d-none mt-3 animate__animated animate__fadeIn">
                <div class="alert bg-dark border-secondary p-4 rounded-3 d-inline-block w-100" style="background-color: #121824 !important;">
                    <h5 id="result-status-text" class="fw-bold mb-3 text-info">O'yin yakunlandi!</h5>
                    <div class="d-flex justify-content-center gap-3">
                        <button onclick="window.location.reload();" class="btn btn-warning px-4 py-2 rounded-pill fw-bold text-dark">
                            <i class="fa-solid fa-rotate-right me-1"></i> Qayta urinish
                        </button>
                        <a href="{% url 'races_list' %}" class="btn btn-outline-info px-4 py-2 rounded-pill">
                            <i class="fa-solid fa-trophy me-1"></i> Reytingni ko'rish
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const originalText = "{{ text_to_type|safe }}";
    const inputField = document.getElementById('input-field');
    const textContainer = document.getElementById('text-to-type');
    const wpmShow = document.getElementById('wpm-val');
    const accShow = document.getElementById('accuracy-val');
    const timeShow = document.getElementById('time-val');

    const resultContainer = document.getElementById('result-container');
    const resultStatusText = document.getElementById('result-status-text');

    let startTime = null;
    let timerInterval = null;
    let isFinished = false;

    // Matn harflarini belgilash
    textContainer.innerHTML = originalText.split('').map(char => `<span>${char}</span>`).join('');
    const charSpans = textContainer.querySelectorAll('span');

    inputField.addEventListener('input', () => {
        if (isFinished) return;

        if (!startTime) {
            startTime = new Date();
            timerInterval = setInterval(updateTimer, 1000);
        }

        const inputVal = inputField.value;
        let correctChars = 0;
        let mistakes = 0;

        charSpans.forEach((span, index) => {
            const char = inputVal[index];
            if (char == null) {
                span.className = '';
            } else if (char === span.innerText) {
                span.className = 'text-success fw-bold';
                correctChars++;
            } else {
                span.className = 'text-danger fw-bold bg-danger bg-opacity-25';
                mistakes++;
            }
        });

        // Anriqlikni hisoblash
        if (inputVal.length > 0) {
            let acc = Math.round(((inputVal.length - mistakes) / inputVal.length) * 100);
            accShow.innerText = acc < 0 ? 0 : acc;
        }

        // Matn to'liq yozib tugatilganda o'yinni to'xtatish
        if (inputVal.length >= originalText.length) {
            finishRace();
        }
    });

    function updateTimer() {
        const timePassed = Math.round((new Date() - startTime) / 1000);
        timeShow.innerText = timePassed;

        const words = inputField.value.length / 5;
        if (timePassed > 0) {
            wpmShow.innerText = Math.round(words / (timePassed / 60));
        }
    }

    function finishRace() {
        clearInterval(timerInterval);
        isFinished = true;
        inputField.disabled = true;

        const finalWpm = wpmShow.innerText;
        const finalAccuracy = accShow.innerText;

        // Backendga natijani yuborish
        fetch("{% url 'save_race_result' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({ wpm: finalWpm, accuracy: finalAccuracy })
        })
        .then(res => res.json())
        .then(data => {
            // Xunuk alert o'rniga matnni pastdagi blok ichida ko'rsatamiz
            resultStatusText.innerText = data.message;
            if(data.status === 'success') {
                resultStatusText.className = "fw-bold mb-3 text-success fs-5 animate__animated animate__bounceIn";
            } else {
                resultStatusText.className = "fw-bold mb-3 text-warning fs-5";
            }
            // Panelni ko'rinadigan qilish
            resultContainer.classList.remove('d-none');
        })
        .catch(err => {
            resultStatusText.innerText = "Natijani saqlashda xatolik yuz berdi.";
            resultStatusText.className = "fw-bold mb-3 text-danger";
            resultContainer.classList.remove('d-none');
        });
    }
</script>

<style>
    /* Chiroyli ranglar effektlari uchun qo'shimcha CSS */
    .tracking-wide span {
        transition: all 0.1s ease;
    }
    .select-none {
        user-select: none;
    }
</style>
{% endblock %}
