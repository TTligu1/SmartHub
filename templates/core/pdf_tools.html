{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 mb-5" style="max-width: 900px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-white fw-bold m-0" style="background: linear-gradient(to right, #ffffff, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
            🚀 SmartHub PDF Tools
        </h2>
        <a href="{% url 'tools_home' %}" class="btn btn-outline-info rounded-pill px-4">
            ← Panelga qaytish
        </a>
    </div>

    <div class="card p-4 border-0 text-white shadow-sm" style="background-color: #121824; border-radius: 16px; border: 1px solid rgba(0, 242, 254, 0.1);">
        <h4 class="fw-bold mb-3 d-flex align-items-center text-danger">
            <i class="fa-solid fa-file-pdf me-2"></i> PDF Tools
        </h4>
        <p class="text-secondary mb-4">PDF hujjatlarini konvertatsiya qiling, birlashtiring yoki qismlarga ajrating.</p>

        <form method="POST" enctype="multipart/form-data" class="w-100 mb-4">
            {% csrf_token %} <div class="mb-3">
                <label class="form-label text-white-50 small">Faylni tanlang:</label>
                <input type="file" name="pdf_file" class="form-control bg-dark text-white border-secondary p-3 shadow-none" style="border-radius: 10px;" required>
            </div>

            <button type="submit" class="btn btn-success w-100 py-3 fw-bold text-uppercase shadow-none border-0" style="border-radius: 10px; background-color: #198754; font-size: 0.95rem; letter-spacing: 1px;">
                HUJJATNI QAYTA ISHLASH ⚡
            </button>
        </form>

        {% if success_message %}
        <div class="alert alert-success bg-success bg-opacity-25 text-white border-success" role="alert">
            <i class="fa-solid fa-circle-check me-2"></i> {{ success_message }}
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
