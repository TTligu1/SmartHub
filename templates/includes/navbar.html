<div class="sidebar-overlay" id="sidebarOverlay"></div>

<style>
    .cursor-pointer { cursor: pointer; }
    .custom-chat-sidebar {
        position: fixed;
        top: 0;
        left: -380px; /* Yashirin holat */
        width: 380px;
        height: 100vh;
        background-color: #161c2a;
        z-index: 1060;
        transition: left 0.3s ease-in-out;
    }
    .custom-chat-sidebar.show {
        left: 0; /* Ochiq holat */
    }
    .sidebar-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 1050;
        display: none;
    }
    .sidebar-overlay.show {
        display: block;
    }
    .sidebar-header { background-color: #0f131f; }
    .active-chat-item { background-color: rgba(0, 242, 254, 0.08) !important; border-left: 3px solid #00f2fe; }
    .overflow-y-auto::-webkit-scrollbar { width: 4px; }
    .overflow-y-auto::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const toggleBtn = document.getElementById("chatToggleBtn");
        const closeBtn = document.getElementById("chatCloseBtn");
        const sidebar = document.getElementById("customChatSidebar");
        const overlay = document.getElementById("sidebarOverlay");

        if(toggleBtn && sidebar && overlay) {
            // Profil bosilganda ochish/yopish
            toggleBtn.addEventListener("click", function(e) {
                e.preventDefault();
                sidebar.classList.toggle("show");
                overlay.classList.toggle("show");
            });

            // Yopish (X) tugmasi bosilganda
            if(closeBtn) {
                closeBtn.addEventListener("click", function() {
                    sidebar.classList.remove("show");
                    overlay.classList.remove("show");
                });
            }

            // Orqa fonga bosilganda yopish
            overlay.addEventListener("click", function() {
                sidebar.classList.remove("show");
                overlay.classList.remove("show");
            });
        }
    });
</script>
