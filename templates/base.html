<div class="modal fade" id="telegramChatModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-white" style="background-color: #161c2a; border: 1px solid rgba(0, 242, 254, 0.2); border-radius: 16px;">

            <div class="modal-header border-bottom border-secondary border-opacity-25 p-3">
                <h5 class="modal-title fw-bold d-flex align-items-center" style="font-size: 1.1rem;">
                    <i class="fa-solid fa-paper-plane text-info me-2"></i> SmartHub Telegram Chat
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body p-3 d-flex flex-column" style="height: 380px;">
                <div class="flex-grow-1 overflow-y-auto d-flex flex-column gap-2 p-2" id="modal-messages-box" style="max-height: 360px;">
                    <div class="text-center text-muted my-auto" id="chat-loading-status">
                        API yo'llari (views.py) tekshirilmoqda...
                    </div>
                </div>
            </div>

            <div class="modal-footer border-top border-secondary border-opacity-10 p-3" style="background-color: #0f131f; border-bottom-left-radius: 16px; border-bottom-right-radius: 16px;">
                <div class="d-flex w-100 align-items-center gap-2">
                    <input type="text" id="modal-chat-input" class="form-control bg-dark text-white border-0 py-2 px-3 shadow-none"
                           placeholder="Xabarni shu yerga yozing..." autocomplete="off" style="border-radius: 10px; font-size: 0.95rem; background-color: #1a2235 !important;">

                    <button type="button" id="modal-send-btn" class="btn btn-info d-flex align-items-center justify-content-center shadow-sm" style="border-radius: 10px; width: 42px; height: 42px;">
                        <i class="fa-solid fa-paper-plane text-dark" style="font-size: 1rem;"></i>
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>

<style>
    #modal-messages-box::-webkit-scrollbar { width: 4px; }
    #modal-messages-box::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const sendBtn = document.getElementById("modal-send-btn");
        const chatInput = document.getElementById("modal-chat-input");
        const messagesBox = document.getElementById("modal-messages-box");
        const loadingStatus = document.getElementById("chat-loading-status");

        // 1. XABARLARNI BAZADAN YUKLASH FUNKSIYASI
        function loadModalMessages() {
            fetch('/api/get-messages/?type=general')
                .then(response => response.json())
                .then(data => {
                    if (messagesBox) {
                        // Agar yuklanmoqda yozuvi bo'lsa, olib tashlaymiz
                        if (loadingStatus) loadingStatus.remove();

                        // Hozirgi scroll eng pastdami yoki yo'qligini tekshirish
                        const isScrolledToBottom = messagesBox.scrollHeight - messagesBox.clientHeight <= messagesBox.scrollTop + 50;

                        messagesBox.innerHTML = ''; // Eski xabarlarni tozalash

                        if (data.messages.length === 0) {
                            messagesBox.innerHTML = '<div class="text-center text-muted my-auto">Suhbat bo\'sh. Birinchi bo\'lib xabar yuboring!</div>';
                            return;
                        }

                        data.messages.forEach(msg => {
                            const msgDiv = document.createElement('div');
                            msgDiv.className = 'd-flex mb-1';

                            // Xabarni yozgan odamga qarab o'ng yoki chapga surish
                            const isMe = msg.sender === "{{ request.user.username }}";
                            msgDiv.style.justifyContent = isMe ? 'flex-end' : 'flex-start';

                            msgDiv.innerHTML = `
                                <div style="max-width: 80%; padding: 8px 12px; border-radius: 14px;
                                            background-color: ${isMe ? '#2b5278' : '#1e2738'};
                                            border: 1px solid ${isMe ? 'rgba(0,242,254,0.1)' : 'rgba(255,255,255,0.02)'}; color: #fff;">
                                    ${!isMe ? `<small style="color: #00f2fe; display: block; font-weight: bold; font-size: 0.8rem; margin-bottom: 2px;">@${msg.sender}</small>` : ''}
                                    <span style="font-size: 0.92rem; word-break: break-word;">${msg.text}</span>
                                    <small style="display: block; text-align: right; font-size: 0.65rem; color: rgba(255,255,255,0.4); margin-top: 3px;">${msg.time}</small>
                                </div>
                            `;
                            messagesBox.appendChild(msgDiv);
                        });

                        // Avtomatik ravishda eng pastki xabarga tushirish
                        if (isScrolledToBottom || messagesBox.innerHTML.includes("Birinchi bo'lib")) {
                            messagesBox.scrollTop = messagesBox.scrollHeight;
                        }
                    }
                })
                .catch(err => console.error("Xabarlarni yuklashda xatolik yuz berdi:", err));
        }

        // 2. YANGI XABAR YUBORISH FUNKSIYASI
        function sendModalMessage() {
            const text = chatInput.value.trim();
            if (!text) return; // Bo'sh bo'lsa jo'natmaydi

            fetch('/api/send-message/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}' // Djangoning xavfsizlik himoyasi
                },
                body: JSON.stringify({
                    type: 'general',
                    text: text
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    chatInput.value = ''; // Input maydonini tozalash
                    loadModalMessages();  // Xabarlarni darhol yangilash
                } else {
                    alert("Xabar yuborilmadi: " + data.message);
                }
            })
            .catch(err => console.error("Yuborishda xatolik:", err));
        }

        // 3. EVENT LISTENERLARNI BIRIKTIRISH
        if (sendBtn) {
            sendBtn.addEventListener("click", function (e) {
                e.preventDefault();
                sendModalMessage();
            });
        }

        if (chatInput) {
            chatInput.addEventListener("keypress", function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendModalMessage();
                }
            });
        }

        // 4. CHAT ISHGA TUSHISHI VA REAL-TIME MONITORING
        loadModalMessages();
        setInterval(loadModalMessages, 2000); // Har 2 soniyada yangi xabarlarni tekshiradi
    });
</script>
