<div class="widget-chat-container">
    <button class="widget-chat-toggle-btn" id="widgetChatToggle">
        <i class="fa-solid fa-comments"></i>
        <span class="widget-badge">1</span>
    </button>

    <div class="widget-chat-box" id="widgetChatBox">
        <div class="widget-chat-header">
            <div class="d-flex align-items-center gap-2">
                <div class="widget-avatar">AH</div>
                <div>
                    <h6 class="m-0 fw-bold text-white" style="font-size: 0.9rem;">Abdujalil Habibullayev</h6>
                    <small class="text-success" style="font-size: 0.7rem;">• onlayn</small>
                </div>
            </div>
            <button class="widget-close-btn" id="widgetChatClose">&times;</button>
        </div>

        <div class="widget-chat-body">
            <div class="widget-msg incoming">
                <div class="widget-msg-text">telegramga kiring</div>
                <div class="widget-msg-time">11:20</div>
            </div>
            <div class="widget-msg outgoing">
                <div class="widget-msg-text">hozir, loyihani tugatyapman</div>
                <div class="widget-msg-time">11:21</div>
            </div>
            <div class="widget-msg incoming">
                <div class="widget-msg-text">o'yindan chiqing unda 😂</div>
                <div class="widget-msg-time">11:21</div>
            </div>
        </div>

        <div class="widget-chat-footer">
            <input type="text" placeholder="Kabar yozing..." id="widgetChatInput">
            <button id="widgetSendBtn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<style>
    .widget-chat-container {
        position: fixed;
        bottom: 25px;
        right: 25px;
        z-index: 99999 !important;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .widget-chat-toggle-btn {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #00f2fe, #4facfe);
        border: none;
        border-radius: 50%;
        color: white;
        font-size: 1.5rem;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
        position: relative;
        transition: transform 0.2s;
    }
    .widget-chat-toggle-btn:hover {
        transform: scale(1.05);
    }
    .widget-badge {
        position: absolute;
        top: -2px;
        right: -2px;
        background-color: #ff4757;
        color: white;
        font-size: 0.75rem;
        padding: 3px 7px;
        border-radius: 50%;
        font-weight: bold;
    }
    .widget-chat-box {
        position: absolute;
        bottom: 75px;
        right: 0;
        width: 360px;
        height: 480px;
        background-color: #161c2a;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.1);
        display: none; /* Dastlab yopiq */
        flex-direction: column;
        overflow: hidden;
    }
    .widget-chat-box.show {
        display: flex;
    }
    .widget-chat-header {
        background-color: #0f131f;
        padding: 12px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .widget-avatar {
        width: 38px;
        height: 38px;
        background-color: #2b5278;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        color: white;
        font-size: 0.85rem;
    }
    .widget-close-btn {
        background: none;
        border: none;
        color: #fff;
        font-size: 1.5rem;
        cursor: pointer;
        opacity: 0.6;
    }
    .widget-close-btn:hover { opacity: 1; }
    .widget-chat-body {
        flex-grow: 1;
        padding: 15px;
        overflow-y: auto;
        background-color: #0f131f;
        display: flex;
        flex-column: column;
        gap: 10px;
    }
    .widget-msg {
        max-width: 75%;
        padding: 8px 12px;
        border-radius: 12px;
        font-size: 0.85rem;
        position: relative;
        color: white;
        margin-bottom: 5px;
    }
    .widget-msg.incoming {
        background-color: #161c2a;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
    }
    .widget-msg.outgoing {
        background-color: #2b5278;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
        margin-left: auto;
    }
    .widget-msg-time {
        font-size: 0.65rem;
        color: rgba(255,255,255,0.4);
        text-align: right;
        margin-top: 3px;
    }
    .widget-chat-footer {
        padding: 10px 15px;
        background-color: #161c2a;
        display: flex;
        gap: 10px;
        align-items: center;
    }
    .widget-chat-footer input {
        flex-grow: 1;
        background-color: #0f131f;
        border: none;
        padding: 10px 15px;
        border-radius: 20px;
        color: white;
        font-size: 0.85rem;
        outline: none;
    }
    .widget-chat-footer button {
        background: none;
        border: none;
        color: #00f2fe;
        font-size: 1.2rem;
        cursor: pointer;
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const toggleBtn = document.getElementById("widgetChatToggle");
        const closeBtn = document.getElementById("widgetChatClose");
        const chatBox = document.getElementById("widgetChatBox");

        if(toggleBtn && chatBox) {
            // Tugma bosilganda oynani ochish/yopish
            toggleBtn.addEventListener("click", function() {
                chatBox.classList.toggle("show");
            });

            // (X) yopish tugmasi
            if(closeBtn) {
                closeBtn.addEventListener("click", function() {
                    chatBox.classList.remove("show");
                });
            }
        }
    });
</script>
